<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ISPAS — Smart Procrastination Analysis System</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:#1a1f4e; --navy-light:#252b6b;
    --accent:#f4a124; --accent2:#e05a9b;
    --green:#2ecc8a; --red:#e05050;
    --blue:#3b82f6; --bg:#f0f2fc;
    --card:#ffffff; --text:#1a1f4e;
    --muted:#7b82b0; --border:#dde1f5;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── LOGIN ── */
  #login-screen{display:flex;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 60%,#1e2d6b 100%);}
  .login-box{background:white;border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 32px 80px rgba(0,0,0,0.25);}
  .login-logo{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--navy);letter-spacing:0.05em;margin-bottom:4px;}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:36px;}
  .login-label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
  .login-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;margin-bottom:16px;}
  .login-input:focus{border-color:var(--navy);}
  .login-btn{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s,transform .1s;letter-spacing:.02em;margin-top:4px;}
  .login-btn:hover{background:var(--navy-light);transform:translateY(-1px);}
  .login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .login-error{background:rgba(224,80,80,.08);border:1px solid rgba(224,80,80,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);font-weight:500;margin-top:12px;display:none;}
  .login-hint{margin-top:24px;padding:14px;background:var(--bg);border-radius:10px;font-size:12px;color:var(--muted);line-height:1.7;}
  .login-hint strong{color:var(--navy);}
  .role-tabs{display:flex;gap:8px;margin-bottom:28px;}
  .role-tab{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;color:var(--muted);transition:all .2s;}
  .role-tab.active{border-color:var(--navy);background:var(--navy);color:white;}

  /* ── APP SHELL ── */
  #app-shell{display:none;min-height:100vh;flex-direction:row;}
  #app-shell.visible{display:flex;}
  .sidebar{width:240px;min-height:100vh;background:var(--navy);display:flex;flex-direction:column;padding:28px 0;position:fixed;top:0;left:0;z-index:100;}
  .logo{padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,.08);}
  .logo-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);letter-spacing:.05em;text-transform:uppercase;}
  .logo-sub{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;}
  .nav{flex:1;padding:20px 0;overflow-y:auto;}
  .nav-label{font-size:10px;font-weight:600;letter-spacing:.12em;color:rgba(255,255,255,.3);text-transform:uppercase;padding:0 24px;margin-bottom:8px;margin-top:16px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;font-size:14px;font-weight:500;color:rgba(255,255,255,.55);cursor:pointer;transition:all .2s;border-left:3px solid transparent;}
  .nav-item:hover{color:white;background:rgba(255,255,255,.05);}
  .nav-item.active{color:white;background:rgba(244,161,36,.12);border-left-color:var(--accent);}
  .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-footer{padding:20px 24px 0;border-top:1px solid rgba(255,255,255,.08);}
  .user-card{display:flex;align-items:center;gap:10px;}
  .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:white;flex-shrink:0;}
  .user-name{font-size:13px;font-weight:600;color:white;}
  .user-role{font-size:11px;color:rgba(255,255,255,.4);}
  .logout-btn{margin-top:12px;width:100%;padding:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.6);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
  .logout-btn:hover{background:rgba(255,255,255,.12);color:white;}
  .main{margin-left:240px;flex:1;padding:32px 36px;min-height:100vh;}
  .page{display:none;}
  .page.active{display:block;animation:fadeUp .4s ease both;}

  /* ── TOPBAR ── */
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
  .page-title{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--navy);}
  .page-sub{font-size:13px;color:var(--muted);margin-top:3px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .badge{background:var(--navy);color:white;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;font-family:'Space Mono',monospace;}
  .badge.orange{background:var(--accent);color:var(--navy);}

  /* ── STAT CARDS ── */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
  .stats-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px;}
  .stat-card{background:var(--card);border-radius:16px;padding:22px 24px;border:1px solid var(--border);position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
  .stat-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,31,78,.08);}
  .stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 16px 0 60px;opacity:.08;}
  .stat-card.blue::before{background:var(--blue);}
  .stat-card.orange::before{background:var(--accent);}
  .stat-card.green::before{background:var(--green);}
  .stat-card.pink::before{background:var(--accent2);}
  .stat-card.red::before{background:var(--red);}
  .stat-icon{font-size:24px;margin-bottom:12px;}
  .stat-value{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:4px;}
  .stat-label{font-size:12px;color:var(--muted);font-weight:500;}
  .stat-change{font-size:11px;font-weight:600;margin-top:8px;}
  .stat-change.up{color:var(--green);}
  .stat-change.down{color:var(--red);}

  /* ── CARDS ── */
  .content-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:20px;}
  .content-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
  .card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:24px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .card-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--navy);letter-spacing:.02em;}
  .card-tag{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--bg);color:var(--muted);}

  /* ── BAR CHART ── */
  .bar-chart{display:flex;flex-direction:column;gap:14px;}
  .bar-row{display:flex;flex-direction:column;gap:6px;}
  .bar-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:500;color:var(--text);}
  .bar-track{height:10px;background:var(--bg);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.4,0,.2,1);}

  /* ── PIE ── */
  .pie-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;}
  .pie-legend{display:flex;flex-direction:column;gap:8px;width:100%;}
  .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;}
  .legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  .legend-pct{margin-left:auto;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--navy);}

  /* ── TABLE ── */
  .student-table{width:100%;border-collapse:collapse;}
  .student-table th{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 12px 12px;text-align:left;border-bottom:1px solid var(--border);}
  .student-table td{padding:12px;font-size:13px;border-bottom:1px solid var(--border);}
  .student-table tr:last-child td{border-bottom:none;}
  .student-table tr:hover td{background:var(--bg);}
  .profile-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
  .profile-chip.focused{background:rgba(46,204,138,.12);color:#1a9b65;}
  .profile-chip.distracted{background:rgba(224,80,80,.10);color:#c43030;}
  .profile-chip.moderate{background:rgba(244,161,36,.12);color:#b07000;}
  .risk-bar{display:flex;align-items:center;gap:8px;}
  .risk-track{flex:1;height:6px;background:var(--bg);border-radius:99px;overflow:hidden;}
  .risk-fill{height:100%;border-radius:99px;}

  /* ── PREDICTION BOX ── */
  .prediction-box{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);border-radius:14px;padding:24px;color:white;position:relative;overflow:hidden;}
  .prediction-box::after{content:'📈';position:absolute;right:20px;top:20px;font-size:40px;opacity:.15;}
  .prediction-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;opacity:.6;margin-bottom:8px;}
  .prediction-score{font-family:'Space Mono',monospace;font-size:48px;font-weight:700;line-height:1;color:var(--accent);}
  .prediction-sub{font-size:12px;opacity:.6;margin-top:6px;}
  .prediction-factors{margin-top:18px;display:flex;flex-direction:column;gap:10px;}
  .factor-row{display:flex;align-items:center;gap:10px;}
  .factor-label{font-size:12px;opacity:.7;width:110px;}
  .factor-track{flex:1;height:5px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;}
  .factor-fill{height:100%;border-radius:99px;background:var(--accent);}
  .factor-val{font-family:'Space Mono',monospace;font-size:11px;opacity:.8;width:32px;text-align:right;}

  /* ── ALERTS ── */
  .alerts{display:flex;flex-direction:column;gap:10px;}
  .alert-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid;}
  .alert-item.warn{background:rgba(244,161,36,.06);border-color:rgba(244,161,36,.3);}
  .alert-item.danger{background:rgba(224,80,80,.06);border-color:rgba(224,80,80,.3);}
  .alert-item.info{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.3);}
  .alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
  .alert-text{font-size:12px;font-weight:500;line-height:1.5;flex:1;}
  .alert-name{font-weight:700;color:var(--navy);}
  .alert-dismiss{font-size:11px;opacity:.4;cursor:pointer;flex-shrink:0;padding:2px 6px;border-radius:4px;}
  .alert-dismiss:hover{opacity:.8;background:rgba(0,0,0,.05);}

  /* ── FORM ── */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-group{display:flex;flex-direction:column;gap:6px;}
  .form-group.full{grid-column:1/-1;}
  .form-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;}
  .form-input,.form-select{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s;width:100%;}
  .form-input:focus,.form-select:focus{border-color:var(--navy);}
  .range-wrap{display:flex;align-items:center;gap:10px;}
  .form-range{flex:1;accent-color:var(--navy);}
  .range-val{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--navy);width:44px;text-align:center;}
  .submit-btn{width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .2s,transform .1s;}
  .submit-btn:hover{background:var(--navy-light);transform:translateY(-1px);}
  .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
  .result-box{display:none;margin-top:16px;padding:16px 20px;border-radius:12px;border:1px solid var(--border);background:var(--bg);}
  .result-box.show{display:block;animation:fadeUp .3s ease;}
  .result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .result-item{text-align:center;}
  .result-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--navy);}
  .result-lbl{font-size:11px;color:var(--muted);margin-top:3px;}

  /* ── CLUSTERING ── */
  .cluster-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;}
  .cluster-card{border-radius:14px;padding:20px;border:1px solid var(--border);}
  .cluster-card.focused-bg{background:linear-gradient(135deg,rgba(46,204,138,.08),rgba(46,204,138,.02));border-color:rgba(46,204,138,.3);}
  .cluster-card.moderate-bg{background:linear-gradient(135deg,rgba(244,161,36,.08),rgba(244,161,36,.02));border-color:rgba(244,161,36,.3);}
  .cluster-card.distracted-bg{background:linear-gradient(135deg,rgba(224,80,80,.08),rgba(224,80,80,.02));border-color:rgba(224,80,80,.3);}
  .cluster-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-bottom:4px;}
  .cluster-count{font-size:32px;font-weight:700;font-family:'Space Mono',monospace;}
  .cluster-count.green{color:var(--green);}
  .cluster-count.orange{color:var(--accent);}
  .cluster-count.red{color:var(--red);}
  .cluster-sub{font-size:11px;color:var(--muted);margin-top:4px;}
  .cluster-members{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
  .cluster-member{font-size:12px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.7);}

  /* ── REPORTS ── */
  .report-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
  .report-stat{background:var(--bg);border-radius:12px;padding:16px;}
  .report-stat-val{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--navy);}
  .report-stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;}
  .report-table{width:100%;border-collapse:collapse;}
  .report-table th{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:0 10px 10px;text-align:left;border-bottom:1px solid var(--border);}
  .report-table td{padding:10px;font-size:12px;border-bottom:1px solid var(--border);}

  /* ── PREFS ── */
  .pref-section{margin-bottom:28px;}
  .pref-section-title{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .pref-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.04);}
  .pref-label{font-size:13px;font-weight:500;}
  .pref-sub{font-size:11px;color:var(--muted);}
  .toggle{width:44px;height:24px;background:var(--border);border-radius:99px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
  .toggle.on{background:var(--green);}
  .toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  .toggle.on::after{left:23px;}

  /* ── MISC ── */
  .search-bar{display:flex;gap:10px;margin-bottom:20px;}
  .search-input{flex:1;padding:10px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--card);outline:none;}
  .search-input:focus{border-color:var(--navy);}
  .filter-select{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:var(--card);outline:none;font-family:'DM Sans',sans-serif;}
  .skeleton{background:linear-gradient(90deg,#e8ebf5 25%,#f0f2fc 50%,#e8ebf5 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:20px;}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .empty-state{text-align:center;padding:48px 24px;color:var(--muted);}
  .empty-icon{font-size:40px;margin-bottom:12px;}
  .empty-text{font-size:14px;}
  #toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
  .toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;color:white;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:fadeUp .3s ease;max-width:360px;line-height:1.4;}
  .toast.info{background:var(--blue);}
  .toast.success{background:var(--green);}
  .toast.error{background:var(--red);}
  .toast.warn{background:var(--accent);color:var(--navy);}
  .grade-result{margin-top:24px;padding:28px;background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:16px;color:white;text-align:center;}
  .grade-score-big{font-family:'Space Mono',monospace;font-size:72px;font-weight:700;color:var(--accent);line-height:1;}
  .grade-label{font-size:13px;opacity:.6;margin-top:8px;}
  .my-profile-card{background:linear-gradient(135deg,var(--navy),var(--navy-light));border-radius:16px;padding:28px;color:white;margin-bottom:20px;}
  .my-profile-name{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);}
  .my-profile-roll{font-size:13px;opacity:.6;margin-top:4px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ════════════════════════════ LOGIN SCREEN ════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">ISPAS</div>
    <div class="login-sub">Smart Procrastination Analysis System · RBU</div>

    <div class="role-tabs">
      <div class="role-tab active" id="tab-admin" onclick="setRoleTab('admin')">👤 Admin / Teacher</div>
      <div class="role-tab" id="tab-student" onclick="setRoleTab('student')">🎓 Student</div>
    </div>

    <label class="login-label">Username</label>
    <input class="login-input" id="login-username" type="text" placeholder="Enter username" autocomplete="username"/>
    <label class="login-label">Password</label>
    <input class="login-input" id="login-password" type="password" placeholder="Enter password" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="login-error" id="login-error"></div>

    <div class="login-hint" id="login-hint-admin">
      <strong>Demo Admin:</strong> username <code>admin</code> · password <code>admin123</code>
    </div>
    <div class="login-hint" id="login-hint-student" style="display:none;">
      <strong>Demo Students:</strong> username = roll number (e.g. <code>23001</code>) · password = roll + 123 (e.g. <code>23001123</code>)
    </div>
  </div>
</div>

<!-- ════════════════════════════ APP SHELL ════════════════════════════ -->
<div id="app-shell">

  <!-- SIDEBAR (populated dynamically based on role) -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">ISPAS</div>
      <div class="logo-sub" id="sidebar-sub">Smart Procrastination Analysis</div>
    </div>
    <nav class="nav" id="sidebar-nav"><!-- injected by JS --></nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar" id="sidebar-avatar">?</div>
        <div>
          <div class="user-name" id="sidebar-name">—</div>
          <div class="user-role" id="sidebar-role">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">⬅ Sign Out</button>
    </div>
  </aside>

  <main class="main" id="main-content">
    <!-- Pages injected here per role -->
  </main>
</div>

<div id="toast-container"></div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────────
const API = "http://127.0.0.1:5000/api";
let currentUser = null;   // { role, username, student_id, student_name }
let allStudents = [];

// ── UTILS ──────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function riskColor(r){return r>=65?'#e05050':r<=35?'#2ecc8a':'#f4a124';}
function profileClass(p){return p==='Focused'?'focused':p==='Distracted'?'distracted':'moderate';}
function predictGrade(study,attend,assign){return Math.min(100,Math.round((study/12)*40+(attend/100)*30+(assign/100)*30));}

function toast(msg,type='info'){
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(()=>t.remove(),400);},3500);
}

function animateBar(id,pct,label){
  const fill=document.getElementById(id),val=document.getElementById(id+'-val');
  if(fill){fill.style.width='0%';setTimeout(()=>fill.style.width=Math.min(100,pct)+'%',50);}
  if(val&&label)val.textContent=label;
}

// ── LOGIN ──────────────────────────────────────────────────────────────────────
function setRoleTab(role){
  document.getElementById('tab-admin').classList.toggle('active',role==='admin');
  document.getElementById('tab-student').classList.toggle('active',role==='student');
  document.getElementById('login-hint-admin').style.display=role==='admin'?'':'none';
  document.getElementById('login-hint-student').style.display=role==='student'?'':'none';
}

async function doLogin(){
  const username=document.getElementById('login-username').value.trim();
  const password=document.getElementById('login-password').value.trim();
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-btn');
  errEl.style.display='none';
  if(!username||!password){errEl.textContent='Please enter username and password.';errEl.style.display='block';return;}
  btn.textContent='Signing in…';btn.disabled=true;
  try{
    const res=await fetch(`${API}/login`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({username,password})});
    const data=await res.json();
    if(!res.ok){errEl.textContent=data.error||'Login failed';errEl.style.display='block';return;}
    currentUser=data;
    showApp();
  }catch(e){errEl.textContent='Cannot reach server. Is Flask running?';errEl.style.display='block';}
  finally{btn.textContent='Sign In →';btn.disabled=false;}
}

async function doLogout(){
  await fetch(`${API}/logout`,{method:'POST',credentials:'include'}).catch(()=>{});
  currentUser=null;
  document.getElementById('app-shell').classList.remove('visible');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-password').value='';
  document.getElementById('login-error').style.display='none';
}

// ── SESSION RESTORE on page refresh ───────────────────────────────────────────
async function restoreSession(){
  try{
    const res=await fetch(`${API}/me`,{credentials:'include'});
    const data=await res.json();
    if(data.logged_in){currentUser=data;showApp();}
    else{document.getElementById('login-screen').style.display='flex';}
  }catch(e){document.getElementById('login-screen').style.display='flex';}
}

// ── BUILD APP BASED ON ROLE ────────────────────────────────────────────────────
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').classList.add('visible');
  // Sidebar user info
  const initials=(currentUser.student_name||currentUser.username||'?').charAt(0).toUpperCase();
  document.getElementById('sidebar-avatar').textContent=initials;
  document.getElementById('sidebar-name').textContent=currentUser.student_name||currentUser.username;
  document.getElementById('sidebar-role').textContent=currentUser.role==='admin'?'Teacher Portal':'Student Portal';

  if(currentUser.role==='admin') buildAdminUI();
  else buildStudentUI();
}

// ── NAVIGATION ─────────────────────────────────────────────────────────────────
function navigate(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('page-'+page);
  if(el)el.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>{
    if(n.getAttribute('onclick')&&n.getAttribute('onclick').includes(`'${page}'`))n.classList.add('active');
  });
  const loaders={
    'admin-dashboard':adminLoadDashboard,
    'admin-data-entry':adminLoadRecentLogs,
    'admin-clustering':adminLoadClustering,
    'admin-grade-prediction':()=>{adminLoadGradeTable();adminUpdateGradePreview();},
    'admin-students':adminLoadStudents,
    'admin-alerts':()=>adminLoadAlerts(true),
    'admin-reports':adminLoadReports,
    'admin-preferences':adminLoadPreferences,
    'stu-dashboard':stuLoadDashboard,
    'stu-data-entry':()=>{},
    'stu-grade-prediction':stuLoadGradePage,
    'stu-alerts':stuLoadAlerts,
    'stu-reports':stuLoadReports,
    'stu-preferences':stuLoadPreferences,
  };
  if(loaders[page])loaders[page]();
}

async function adminLoadDashboard(){
  try{
    const[dash,risk,alerts]=await Promise.all([
      fetch(`${API}/dashboard`,{credentials:'include'}).then(r=>r.json()),
      fetch(`${API}/risk-monitor`,{credentials:'include'}).then(r=>r.json()),
      fetch(`${API}/alerts`,{credentials:'include'}).then(r=>r.json()),
    ]);
    document.getElementById('kpi-students').textContent=dash.total_students;
    document.getElementById('kpi-social').textContent=dash.avg_social_media+'h';
    document.getElementById('kpi-focused').textContent=dash.focused_pct+'%';
    document.getElementById('kpi-atrisk').textContent=dash.at_risk_count;
    animateBar('bar-study',dash.avg_study_hours/12*100,dash.avg_study_hours+'h avg');
    animateBar('bar-social',dash.avg_social_media/12*100,dash.avg_social_media+'h avg');
    animateBar('bar-assign',dash.avg_assignment,dash.avg_assignment+'%');
    animateBar('bar-attend',dash.avg_attendance,dash.avg_attendance+'%');
    animateBar('bar-stress',dash.avg_stress*10,dash.avg_stress+' / 10');
    adminUpdatePie(dash.task_distribution||{});
    const g=predictGrade(dash.avg_study_hours,dash.avg_attendance,dash.avg_assignment);
    document.getElementById('dash-grade').textContent=g;
    document.getElementById('pf-study').style.width=(dash.avg_study_hours/12*100)+'%';
    document.getElementById('pf-attend').style.width=dash.avg_attendance+'%';
    document.getElementById('pf-assign').style.width=dash.avg_assignment+'%';
    document.getElementById('pf-study-val').textContent=dash.avg_study_hours+'h';
    document.getElementById('pf-attend-val').textContent=dash.avg_attendance+'%';
    document.getElementById('pf-assign-val').textContent=dash.avg_assignment+'%';
    adminRenderRiskTable(risk);
    const unread=alerts.filter(a=>!a.is_read).length;
    const badge=document.getElementById('alert-badge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
    const countBadge=document.getElementById('alert-count-badge');
    if(countBadge)countBadge.textContent=unread+' New';
    adminRenderDashAlerts(alerts.slice(0,4));
  }catch(e){toast('Cannot reach backend. Is Flask running?','error');}
}

function adminUpdatePie(td){
  const CIRC=283;
  const keys=['Reading','Writing','Project Work','Social Media'];
  const elIds=['pie-reading','pie-writing','pie-project','pie-social-pct'];
  let offset=0;
  keys.forEach((k,i)=>{
    const pct=td[k]||0,arc=CIRC*pct/100;
    const seg=document.getElementById('pie-seg-'+i);
    if(seg){seg.setAttribute('stroke-dasharray',`${arc} ${CIRC}`);seg.setAttribute('stroke-dashoffset',-offset);}
    const el=document.getElementById(elIds[i]);
    if(el)el.textContent=pct+'%';
    offset+=arc;
  });
  const tc=document.getElementById('pie-types');
  if(tc)tc.textContent=Object.keys(td).length+' types';
}

function adminRenderRiskTable(students){
  const tbody=document.getElementById('risk-table-body');
  if(!tbody)return;
  if(!students.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:20px;">No student data</td></tr>';return;}
  tbody.innerHTML=students.slice(0,5).map(s=>`
    <tr><td><strong>${esc(s.name)}</strong></td>
    <td><span class="profile-chip ${profileClass(s.profile)}">● ${esc(s.profile)}</span></td>
    <td>${s.social_media_hours}h/day</td>
    <td><div class="risk-bar"><div class="risk-track"><div class="risk-fill" style="width:${s.risk_score}%;background:${riskColor(s.risk_score)};"></div></div>
    <span style="font-size:11px;font-weight:700;color:${riskColor(s.risk_score)}">${s.risk_score}%</span></div></td></tr>`).join('');
}

function adminRenderDashAlerts(alerts){
  const el=document.getElementById('dash-alerts');
  if(!el)return;
  if(!alerts.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No alerts</div></div>';return;}
  el.innerHTML=alerts.map(a=>`
    <div class="alert-item ${a.level}" data-id="${a.id}">
      <div class="alert-icon">${a.level==='danger'?'🚨':a.level==='warn'?'⚠️':'ℹ️'}</div>
      <div class="alert-text"><span class="alert-name">${esc(a.student_name||'System')}.</span> — ${esc(a.message)}</div>
      <span class="alert-dismiss" onclick="markRead(${a.id},this.parentElement)">✕</span>
    </div>`).join('');
}

async function adminSubmitLog(prefix){
  const name=document.getElementById(prefix+'-name')?.value.trim();
  const roll=document.getElementById(prefix+'-roll')?.value.trim();
  if(!name||!roll){toast('Please enter Student Name and Roll Number.','warn');return;}
  const payload={name,roll_number:roll,
    study_hours:parseFloat(document.getElementById(prefix+'-study').value),
    social_media_hours:parseFloat(document.getElementById(prefix+'-social').value),
    stress_level:parseInt(document.getElementById(prefix+'-stress').value),
    attendance_pct:parseInt(document.getElementById(prefix+'-attend').value),
    assignment_completion:parseInt(document.getElementById(prefix+'-assign').value),
    task_type:document.getElementById(prefix+'-task').value};
  const btn=document.querySelector(`#page-admin-${prefix==='de'?'data-entry':'dashboard'} .submit-btn`);
  if(btn){btn.textContent='⏳ Saving…';btn.disabled=true;}
  try{
    const res=await fetch(`${API}/logs`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok){toast('Error: '+(data.error||'Unknown'),'error');return;}
    toast(`✅ Saved! Risk: ${data.risk_score}% · ${data.profile} · Grade: ${data.predicted_grade}`,'success');
    const rb=document.getElementById(prefix+'-result');
    if(rb)rb.classList.add('show');
    ['risk','profile','grade'].forEach((k,i)=>{
      const el=document.getElementById(prefix+'-res-'+k);
      if(el)el.textContent=[data.risk_score+'%',data.profile,data.predicted_grade][i];
    });
    const an=document.getElementById(prefix+'-alerts-note');
    if(an&&data.alerts_generated>0)an.textContent=`⚠️ ${data.alerts_generated} alert(s) generated.`;
    adminLoadDashboard();if(prefix==='de')adminLoadRecentLogs();allStudents=[];
  }catch(e){toast('Network error — is Flask running?','error');}
  finally{if(btn){btn.textContent='💾 Save & Analyse Student Data';btn.disabled=false;}}
}

async function adminLoadClustering(){
  try{
    const students=await fetch(`${API}/students`,{credentials:'include'}).then(r=>r.json());
    const groups={Focused:[],Moderate:[],Distracted:[]};
    students.forEach(s=>{if(groups[s.profile])groups[s.profile].push(s);});
    ['focused','moderate','distracted'].forEach(key=>{
      const cap=key.charAt(0).toUpperCase()+key.slice(1);
      const countEl=document.getElementById(`cl-${key}-count`);
      if(countEl)countEl.textContent=groups[cap].length;
      const memEl=document.getElementById(`cl-${key}-members`);
      if(memEl)memEl.innerHTML=groups[cap].slice(0,4).map(s=>`<div class="cluster-member">${esc(s.name)} <span style="opacity:.5;font-size:10px;">· ${s.risk_score}%</span></div>`).join('')+(groups[cap].length>4?`<div class="cluster-member" style="opacity:.5;">+${groups[cap].length-4} more</div>`:'');
    });
    const tbody=document.getElementById('cluster-table-body');
    if(tbody)tbody.innerHTML=students.map(s=>`
      <tr><td><strong>${esc(s.name)}</strong></td><td style="color:var(--muted);">${esc(s.roll_number)}</td>
      <td>${s.study_hours??'—'}h</td><td>${s.social_media_hours??'—'}h</td>
      <td>${s.attendance_pct??'—'}%</td><td>${s.assignment_completion??'—'}%</td>
      <td><span class="profile-chip ${profileClass(s.profile)}">● ${esc(s.profile)}</span></td>
      <td><div class="risk-bar"><div class="risk-track"><div class="risk-fill" style="width:${s.risk_score}%;background:${riskColor(s.risk_score)};"></div></div>
      <span style="font-size:11px;font-weight:700;color:${riskColor(s.risk_score)}">${s.risk_score}%</span></div></td></tr>`).join('');
  }catch(e){toast('Failed to load clustering data.','error');}
}

function adminUpdateGradePreview(){
  const study=parseFloat(document.getElementById('gp-study')?.value||5);
  const attend=parseFloat(document.getElementById('gp-attend')?.value||80);
  const assign=parseFloat(document.getElementById('gp-assign')?.value||70);
  const grade=predictGrade(study,attend,assign);
  const el=document.getElementById('gp-score');if(el)el.textContent=grade;
  const rm=document.getElementById('gp-remark');
  if(rm)rm.textContent=grade>=75?'🟢 On track for distinction':grade>=60?'🟡 Moderate performance':'🔴 At risk — intervention advised';
}

    const students=await fetch(`${API}/students`,{credentials:'include'}).then(r=>r.json());

function adminFilterStudents(){
  const q=document.getElementById('student-search').value.toLowerCase();
  const f=document.getElementById('student-filter').value;
  adminRenderStudentsTable(allStudents.filter(s=>(!q||s.name.toLowerCase().includes(q)||s.roll_number.toLowerCase().includes(q))&&(!f||s.profile===f)));
}

async function adminLoadAlerts(fullPage=false){
  try{
    const alerts=await fetch(`${API}/alerts`,{credentials:'include'}).then(r=>r.json());
    const unread=alerts.filter(a=>!a.is_read).length;
    const badge=document.getElementById('alert-badge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
    if(fullPage){
      const list=document.getElementById('alerts-page-list');
      const countEl=document.getElementById('alerts-page-count');
      if(countEl)countEl.textContent=alerts.length+' Total';
      if(list){
        if(!alerts.length){list.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No alerts</div></div>';}
        else list.innerHTML=alerts.map(a=>`
          <div class="alert-item ${a.level}" id="alert-${a.id}" style="${a.is_read?'opacity:0.5;':''}">
            <div class="alert-icon">${a.level==='danger'?'🚨':a.level==='warn'?'⚠️':'ℹ️'}</div>
            <div class="alert-text"><span class="alert-name">${esc(a.student_name||'System')}.</span> — ${esc(a.message)}<div style="font-size:10px;color:var(--muted);margin-top:4px;">${a.created_at||''}</div></div>
            ${!a.is_read?`<span class="alert-dismiss" onclick="markRead(${a.id},document.getElementById('alert-${a.id}'))">✕</span>`:''}
          </div>`).join('');
        const danger=alerts.filter(a=>a.level==='danger').length;
        const warn=alerts.filter(a=>a.level==='warn').length;
        const info=alerts.filter(a=>a.level==='info').length;
        document.getElementById('alert-danger-count').textContent=danger;
        document.getElementById('alert-warn-count').textContent=warn;
        document.getElementById('alert-info-count').textContent=info;
      }
    }
  }catch(e){}
}

async function stuLoadDashboard(){
  try{
    const data=await fetch(`${API}/my/dashboard`,{credentials:'include'}).then(r=>r.json());
    if(data.no_data){toast('No habit logs yet. Please add data in Data Entry.','info');return;}
    document.getElementById('stu-name').textContent=data.name;
    document.getElementById('stu-roll').textContent='Roll No. '+data.roll_number;
    document.getElementById('stu-sub').textContent=data.name+' · Roll '+data.roll_number+' · RBU';
    document.getElementById('stu-risk').textContent=data.risk_score+'%';
    document.getElementById('stu-grade').textContent=data.predicted_grade;
    document.getElementById('stu-social').textContent=data.social_media_hours+'h';
    const riskNote=document.getElementById('stu-risk-note');
    if(riskNote){riskNote.textContent=data.risk_score>=65?'⚠️ High risk':data.risk_score<=35?'✅ Low risk':'⚡ Moderate';riskNote.className='stat-change '+(data.risk_score>=65?'down':'up');}
    const chip=document.getElementById('stu-profile-chip');
    if(chip){chip.textContent='● '+data.profile;chip.className='profile-chip '+profileClass(data.profile);}
    animateBar('stu-bar-study',data.avg_study_7d/12*100,data.avg_study_7d+'h avg');
    animateBar('stu-bar-social',data.avg_social_7d/12*100,data.avg_social_7d+'h avg');
    animateBar('stu-bar-assign',data.avg_assign_7d,data.avg_assign_7d+'%');
    animateBar('stu-bar-attend',data.avg_attend_7d,data.avg_attend_7d+'%');
    animateBar('stu-bar-stress',data.avg_stress_7d*10,data.avg_stress_7d+' / 10');
    document.getElementById('stu-dash-grade').textContent=data.predicted_grade;
    document.getElementById('stu-pf-study').style.width=(data.study_hours/12*100)+'%';
    document.getElementById('stu-pf-attend').style.width=data.attendance_pct+'%';
    document.getElementById('stu-pf-assign').style.width=data.assignment_completion+'%';
    document.getElementById('stu-pf-study-val').textContent=data.study_hours+'h';
    document.getElementById('stu-pf-attend-val').textContent=data.attendance_pct+'%';
    document.getElementById('stu-pf-assign-val').textContent=data.assignment_completion+'%';
    // Load own alerts for dash
    const alerts=await fetch(`${API}/my/alerts`,{credentials:'include'}).then(r=>r.json());
    const unread=alerts.filter(a=>!a.is_read).length;
    const badge=document.getElementById('alert-badge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
    const dashBadge=document.getElementById('stu-alert-badge-dash');
    if(dashBadge)dashBadge.textContent=unread+' New';
    const dashAlerts=document.getElementById('stu-dash-alerts');
    if(dashAlerts){
      if(!alerts.length)dashAlerts.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No alerts — keep it up!</div></div>';
      else dashAlerts.innerHTML=alerts.slice(0,4).map(a=>`
        <div class="alert-item ${a.level}">
          <div class="alert-icon">${a.level==='danger'?'🚨':a.level==='warn'?'⚠️':'ℹ️'}</div>
          <div class="alert-text">${esc(a.message)}</div>
          <span class="alert-dismiss" onclick="markRead(${a.id},this.parentElement)">✕</span>
        </div>`).join('');
    }
  }catch(e){toast('Cannot reach backend.','error');}
}

async function stuSubmitLog(){
  const payload={
    study_hours:parseFloat(document.getElementById('sde-study').value),
    social_media_hours:parseFloat(document.getElementById('sde-social').value),
    stress_level:parseInt(document.getElementById('sde-stress').value),
    attendance_pct:parseInt(document.getElementById('sde-attend').value),
    assignment_completion:parseInt(document.getElementById('sde-assign').value),
    task_type:document.getElementById('sde-task').value,
    // name/roll_number filled by server from session
    name:'__from_session__', roll_number:'__from_session__',
  };
  const btn=document.querySelector('#page-stu-data-entry .submit-btn');
  if(btn){btn.textContent='⏳ Saving…';btn.disabled=true;}
  try{
    const res=await fetch(`${API}/logs`,{method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify(payload)});
    const data=await res.json();
    if(!res.ok){toast('Error: '+(data.error||'Unknown'),'error');return;}
    toast(`✅ Saved! Risk: ${data.risk_score}% · ${data.profile} · Grade: ${data.predicted_grade}`,'success');
    const rb=document.getElementById('sde-result');if(rb)rb.classList.add('show');
    document.getElementById('sde-res-risk').textContent=data.risk_score+'%';
    document.getElementById('sde-res-profile').textContent=data.profile;
    document.getElementById('sde-res-grade').textContent=data.predicted_grade;
    const an=document.getElementById('sde-alerts-note');
    if(an&&data.alerts_generated>0)an.textContent=`⚠️ ${data.alerts_generated} alert(s) generated for you.`;
    stuLoadDashboard();
  }catch(e){toast('Network error — is Flask running?','error');}
  finally{if(btn){btn.textContent='💾 Save My Today\'s Data';btn.disabled=false;}}
}

function stuUpdateGradePreview(){
  const study=parseFloat(document.getElementById('sgp-study')?.value||5);
  const attend=parseFloat(document.getElementById('sgp-attend')?.value||80);
  const assign=parseFloat(document.getElementById('sgp-assign')?.value||70);
  const grade=predictGrade(study,attend,assign);
  const el=document.getElementById('sgp-score');if(el)el.textContent=grade;
  const rm=document.getElementById('sgp-remark');
  if(rm)rm.textContent=grade>=75?'🟢 On track for distinction':grade>=60?'🟡 Moderate performance':'🔴 At risk — talk to your teacher';
}

async function stuLoadGradePage(){
  stuUpdateGradePreview();
  try{
    const data=await fetch(`${API}/my/dashboard`,{credentials:'include'}).then(r=>r.json());
    if(data.no_data)return;
    // Pre-fill sliders with my actual data
    const fields=[['sgp-study','sgp-study-v',data.study_hours,'h'],['sgp-attend','sgp-attend-v',data.attendance_pct,'%'],['sgp-assign','sgp-assign-v',data.assignment_completion,'%']];
    fields.forEach(([id,vid,val,unit])=>{
      const el=document.getElementById(id);
      const vel=document.getElementById(vid);
      if(el)el.value=val;
      if(vel)vel.textContent=val+unit;
    });
    stuUpdateGradePreview();
    const myData=document.getElementById('sgp-my-data');
    if(myData)myData.innerHTML=`
      <div style="display:flex;flex-direction:column;gap:12px;">
        <div class="report-stat"><div class="report-stat-val" style="color:${data.predicted_grade>=75?'var(--green)':data.predicted_grade>=60?'var(--accent)':'var(--red);'};">${data.predicted_grade}</div><div class="report-stat-lbl">My Predicted Grade</div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          <div class="report-stat"><div class="report-stat-val">${data.study_hours}h</div><div class="report-stat-lbl">Study Hrs</div></div>
          <div class="report-stat"><div class="report-stat-val">${data.attendance_pct}%</div><div class="report-stat-lbl">Attendance</div></div>
          <div class="report-stat"><div class="report-stat-val">${data.assignment_completion}%</div><div class="report-stat-lbl">Assignments</div></div>
        </div>
        <div style="padding:12px;background:var(--bg);border-radius:10px;font-size:12px;color:var(--muted);">
          Grade formula: <strong style="color:var(--navy);">(Study/12)×40 + (Attendance/100)×30 + (Assignment/100)×30</strong>
        </div>
      </div>`;
  }catch(e){}
}

async function stuLoadAlerts(){
  try{
    const alerts=await fetch(`${API}/my/alerts`,{credentials:'include'}).then(r=>r.json());
    const unread=alerts.filter(a=>!a.is_read).length;
    const badge=document.getElementById('alert-badge');
    if(badge){if(unread>0){badge.textContent=unread;badge.style.display='inline';}else badge.style.display='none';}
    const countEl=document.getElementById('stu-alerts-count');
    if(countEl)countEl.textContent=alerts.length+' Total';
    const list=document.getElementById('stu-alerts-list');
    if(list){
      if(!alerts.length)list.innerHTML='<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-text">No alerts — great work!</div></div>';
      else list.innerHTML=alerts.map(a=>`
        <div class="alert-item ${a.level}" id="alert-${a.id}" style="${a.is_read?'opacity:0.5;':''}">
          <div class="alert-icon">${a.level==='danger'?'🚨':a.level==='warn'?'⚠️':'ℹ️'}</div>
          <div class="alert-text">${esc(a.message)}<div style="font-size:10px;color:var(--muted);margin-top:4px;">${a.created_at||''}</div></div>
          ${!a.is_read?`<span class="alert-dismiss" onclick="markRead(${a.id},document.getElementById('alert-${a.id}'))">✕</span>`:''}
        </div>`).join('');
    }
  }catch(e){}
}

async function stuLoadReports(){
  try{
    const data=await fetch(`${API}/my/dashboard`,{credentials:'include'}).then(r=>r.json());
    if(data.no_data){document.getElementById('stu-report-stats').innerHTML='<div style="color:var(--muted);font-size:13px;padding:20px;">No data yet. Please log habits in Data Entry.</div>';return;}
    const statsEl=document.getElementById('stu-report-stats');
    if(statsEl)statsEl.innerHTML=`
      <div class="report-stat"><div class="report-stat-val" style="color:${riskColor(data.risk_score)};">${data.risk_score}%</div><div class="report-stat-lbl">My Risk Score</div></div>
      <div class="report-stat"><div class="report-stat-val" style="color:${data.predicted_grade>=75?'var(--green)':data.predicted_grade>=60?'var(--accent)':'var(--red)'};">${data.predicted_grade}</div><div class="report-stat-lbl">Predicted Grade</div></div>
      <div class="report-stat"><div class="report-stat-val">${data.study_hours}h</div><div class="report-stat-lbl">Study Hours</div></div>
      <div class="report-stat"><div class="report-stat-val">${data.social_media_hours}h</div><div class="report-stat-lbl">Social Media</div></div>
      <div class="report-stat"><div class="report-stat-val">${data.attendance_pct}%</div><div class="report-stat-lbl">Attendance</div></div>
      <div class="report-stat"><div class="report-stat-val">${data.assignment_completion}%</div><div class="report-stat-lbl">Assignments</div></div>`;
    const logEl=document.getElementById('stu-log-history');
    if(logEl&&data.logs)logEl.innerHTML=data.logs.map(l=>`
      <tr><td style="color:var(--muted);font-size:11px;">${(l.logged_at||'').substring(0,10)}</td>
      <td>${l.study_hours}h</td><td>${l.social_media_hours}h</td><td>${l.stress_level}/10</td>
      <td>${l.attendance_pct}%</td><td>${l.assignment_completion}%</td></tr>`).join('');
  }catch(e){toast('Failed to load reports.','error');}
}

function stuLoadPreferences(){
  const nameEl=document.getElementById('stu-pref-name');
  const rollEl=document.getElementById('stu-pref-roll');
  if(nameEl)nameEl.textContent=currentUser.student_name||'—';
  if(rollEl)rollEl.textContent=currentUser.username||'—';
}

// ── SHARED ─────────────────────────────────────────────────────────────────────
async function markRead(id,el){
  try{
    await fetch(`${API}/alerts/${id}/read`,{method:'PATCH',credentials:'include'});
    if(el){el.style.opacity='.4';el.style.pointerEvents='none';}
  }catch(e){}
}

// ── BOOT ───────────────────────────────────────────────────────────────────────
restoreSession();
</script>
